<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>電子印鑑アプリ（丸・角切替）</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@900&display=swap');
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #eee; margin: 0; padding: 20px; }
        .controls { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; width: 100%; max-width: 850px; text-align: center; }
        #pdf-container { position: relative; border: 2px solid #333; background: white; cursor: crosshair; display: none; margin-top: 10px;}
        canvas { max-width: 100%; height: auto; }
        .stamp-preview {
            position: absolute; width: 60px; height: 60px; border: 1px dashed red;
            pointer-events: none; transform: translate(-50%, -50%); display: none;
        }
        button { padding: 10px 20px; cursor: pointer; background: #d32f2f; color: white; border: none; border-radius: 4px; font-weight: bold; margin: 5px; }
        select { padding: 10px; margin: 10px; border-radius: 4px; border: 1px solid #ccc; font-size: 16px; }
        .label-text { font-weight: bold; margin-right: 5px; }
    </style>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
</head>
<body>

<div class="controls">
    <h2>関東学生バドミントン連盟　電子印鑑（丸印・角印 切替）</h2>
    
    <div>
        <span class="label-text">1. 名前:</span>
        <select id="name-select"><option value="">読み込み中...</option></select>
        <button onclick="loadNames()">更新</button>
        
        <span class="label-text" style="margin-left:20px;">2. 形:</span>
        <select id="shape-select">
　　　　　　<option value="square">角形（団体印）</option>
            <option value="round">丸形（個人印）</option>
         </select>
    </div>
    
    <hr>
    <p>3. PDFを選択して押印位置をクリック</p>
    <input type="file" id="pdf-upload" accept=".pdf">
    <br>
    <button id="download-btn" style="display:none;" onclick="savePdf()">この位置で確定して保存</button>
</div>

<div id="pdf-container">
    <canvas id="pdf-render"></canvas>
    <div id="stamp-mark" class="stamp-preview"></div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
    const gasUrl = "https://script.google.com/macros/s/AKfycbz31FNwW2jCX66e53ib0z39IdhYWwe-yFSSLxnS8DR_6O4biFM9xdHP__sbAlJlgeuE/exec";
    let currentPdfBytes, stampPos = { x: 0, y: 0 }, pdfScale = 1;

    window.onload = loadNames;

    async function loadNames() {
        const select = document.getElementById('name-select');
        try {
            const res = await fetch(gasUrl);
            const data = await res.json();
            select.innerHTML = "";
            data.names.forEach(name => {
                const opt = document.createElement('option');
                opt.value = name; opt.textContent = name;
                select.appendChild(opt);
            });
        } catch (e) {
            select.innerHTML = "<option value='関東学生バドミントン連盟'>関東学生バドミントン連盟</option><option value='坪井'>坪井</option><option value='升'>升</option>";
        }
    }

    // PDF表示・クリック処理 (変更なし)
    document.getElementById('pdf-upload').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const buffer = await file.arrayBuffer();
        currentPdfBytes = new Uint8Array(buffer); 
        const loadingTask = pdfjsLib.getDocument({data: currentPdfBytes.slice()});
        const pdf = await loadingTask.promise;
        const page = await pdf.getPage(1);
        const viewport = page.getViewport({scale: 1.5});
        const canvas = document.getElementById('pdf-render');
        const context = canvas.getContext('2d');
        canvas.height = viewport.height;
        canvas.width = viewport.width;
        pdfScale = viewport.width / page.getViewport({scale: 1}).width;
        await page.render({canvasContext: context, viewport: viewport}).promise;
        document.getElementById('pdf-container').style.display = 'block';
        document.getElementById('download-btn').style.display = 'inline-block';
    });

    document.getElementById('pdf-container').addEventListener('click', (e) => {
        const rect = e.currentTarget.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const mark = document.getElementById('stamp-mark');
        mark.style.display = 'block'; mark.style.left = x + 'px'; mark.style.top = y + 'px';
        const canvas = document.getElementById('pdf-render');
        stampPos.x = (x / canvas.clientWidth) * (canvas.width / pdfScale);
        stampPos.y = (1 - (y / canvas.clientHeight)) * (canvas.height / pdfScale);
    });

    async function savePdf() {
        const name = document.getElementById('name-select').value;
        const shape = document.getElementById('shape-select').value;
        if (!name || !currentPdfBytes) return;

        try {
            const { PDFDocument } = PDFLib;
            const pdfDoc = await PDFDocument.load(currentPdfBytes.slice());
            
            const canvas = document.createElement('canvas');
            const size = 300; 
            canvas.width = size; canvas.height = size;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'red'; ctx.strokeStyle = 'red'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            const fontStack = "'Zen Old Mincho', 'serif'";

            if (shape === "round") {
                // --- 丸印のデザイン (16.5mm用) ---
                ctx.lineWidth = 10;
                ctx.beginPath(); ctx.arc(size/2, size/2, size/2 - 15, 0, Math.PI * 2); ctx.stroke();
                
                if (name.length === 1) {
                    ctx.font = `900 ${size * 0.5}px ${fontStack}`;
                    ctx.fillText(name, size/2, size/2);
                } else if (name.length === 2) {
                    ctx.font = `900 ${size * 0.35}px ${fontStack}`;
                    ctx.fillText(name[0], size/2, size * 0.32);
                    ctx.fillText(name[1], size/2, size * 0.68);
                } else {
                    ctx.font = `900 ${size * 0.25}px ${fontStack}`;
                    ctx.fillText(name, size/2, size/2);
                }
            } else {
                // --- 角印のデザイン (24mm用 / 3列自動分配) ---
                ctx.lineWidth = 12; ctx.strokeRect(10, 10, size-20, size-20);
                ctx.lineWidth = 4; ctx.strokeRect(22, 22, size-44, size-44);
                
                ctx.shadowColor = 'red'; ctx.shadowBlur = 1;

                // 文字を3列に分配するロジック（13文字以上対応）
                let columns = [];
                const totalLen = name.length;
                const basePerCol = Math.floor(totalLen / 3);
                const extra = totalLen % 3; 

                let start = 0;
                for (let i = 0; i < 3; i++) {
                    let count = basePerCol + (i < extra ? 1 : 0);
                    columns.push(name.substring(start, start + count));
                    start += count;
                }

                // 伝統的な配置：右の列から順に描画
                columns.reverse().forEach((colText, i) => {
                    const colCount = columns.length;
                    const xPos = (size / (colCount + 1)) * (i + 1);

                    const maxCharsInCol = Math.max(...columns.map(c => c.length));
                    const fontSize = size / (maxCharsInCol + 1.1);
                    ctx.font = `900 ${fontSize}px ${fontStack}`;

                    for (let j = 0; j < colText.length; j++) {
                        const yPos = (size / (colText.length + 1)) * (j + 1);
                        ctx.fillText(colText[j], xPos, yPos);
                    }
                });
            }

            const imgBytes = await new Promise(r => canvas.toBlob(b => b.arrayBuffer().then(r)));
            const stampImg = await pdfDoc.embedPng(imgBytes);
            const page = pdfDoc.getPages()[0];

            // 物理サイズの計算 (24mm or 16.5mm)
            const mmToPt = 72 / 25.4; 
            const stampSize = (shape === "round") ? 16.5 * mmToPt : 24 * mmToPt;
            
            page.drawImage(stampImg, {
                x: stampPos.x - (stampSize / 2), 
                y: stampPos.y - (stampSize / 2), 
                width: stampSize, 
                height: stampSize
            });

            const bytes = await pdfDoc.save();
            const link = document.createElement('a');
            link.href = URL.createObjectURL(new Blob([bytes], {type: 'application/pdf'}));
            link.download = `押印済_${name}.pdf`;
            link.click();
        } catch (e) {
            console.error(e); alert("保存エラーが発生しました。");
        }
    }
</script>
</body>
</html>
